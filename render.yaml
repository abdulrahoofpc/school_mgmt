services:
  - type: web
    name: school-mgmt
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn school_mgmt.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: school-mgmt-db
          property: connectionString

databases:
  - name: school-mgmt-db
    databaseName: school_mgmt
    user: school_mgmt_user
    plan: free