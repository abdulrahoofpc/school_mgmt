services:
  - type: web
    name: school-mgmt
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn school_mgmt.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DATABASE_URL
        value: "sqlite:///db.sqlite3"