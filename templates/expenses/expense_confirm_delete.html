{% extends 'base.html' %}
{% block title %}Delete Expense{% endblock %}
{% block page_title %}Delete Expense{% endblock %}
{% block content %}
<div style="max-width:480px; margin:0 auto;">
  <div class="card">
    <div style="text-align:center; padding:10px 0 20px;">
      <div style="font-size:40px; color:var(--danger); margin-bottom:12px;"><i class="fas fa-exclamation-triangle"></i></div>
      <h2 style="font-size:18px; margin-bottom:8px;">Delete Expense?</h2>
      <p class="text-muted" style="font-size:13px;">
        Permanently delete <strong style="color:var(--text);">{{ expense.title }}</strong>
        (₹{{ expense.amount }})? This cannot be undone.
      </p>
    </div>
    <div style="display:flex; gap:10px; justify-content:center;">
      <form method="post">{% csrf_token %}
        <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Yes, Delete</button>
      </form>
      <a href="{% url 'expenses:list' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
