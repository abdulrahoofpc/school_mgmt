{% extends 'base.html' %}
{% block title %}{{ action }} Teacher{% endblock %}
{% block page_title %}{{ action }} Teacher{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ action }} Teacher</h1>
  <a href="{% url 'teachers:list' %}" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Back</a>
</div>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <div class="card" style="margin-bottom:16px;">
    <div class="card-header"><span class="card-title">Teacher Details</span></div>
    <div class="form-grid">
      <div class="form-group">
        <label>First Name *</label>
        <input type="text" name="first_name" class="form-control" value="{{ teacher.first_name|default:'' }}" required />
      </div>
      <div class="form-group">
        <label>Last Name *</label>
        <input type="text" name="last_name" class="form-control" value="{{ teacher.last_name|default:'' }}" required />
      </div>
      <div class="form-group">
        <label>Employee ID *</label>
        <input type="text" name="employee_id" class="form-control" value="{{ teacher.employee_id|default:'' }}" required />
      </div>
      <div class="form-group">
        <label>Subject *</label>
        <select name="subject" class="form-control" required>
          <option value="">-- Select Subject --</option>
          {% for val, label in subject_choices %}
          <option value="{{ val }}" {% if teacher.subject == val %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Phone *</label>
        <input type="tel" name="phone" class="form-control" value="{{ teacher.phone|default:'' }}" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-control" value="{{ teacher.email|default:'' }}" />
      </div>
      <div class="form-group">
        <label>Date of Joining *</label>
        <input type="date" name="date_of_joining" class="form-control" value="{{ teacher.date_of_joining|default:'' }}" required />
      </div>
      <div class="form-group">
        <label>Monthly Salary (₹) *</label>
        <input type="number" name="monthly_salary" class="form-control" value="{{ teacher.monthly_salary|default:'' }}" step="0.01" required />
      </div>
      <div class="form-group" style="grid-column:1/-1;">
        <label>Address</label>
        <textarea name="address" class="form-control">{{ teacher.address|default:'' }}</textarea>
      </div>
      <div class="form-group">
        <label>Photo</label>
        <input type="file" name="photo" class="form-control" accept="image/*" />
      </div>
    </div>
  </div>

  <div style="display:flex; gap:10px;">
    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Teacher</button>
    <a href="{% url 'teachers:list' %}" class="btn btn-ghost">Cancel</a>
  </div>
</form>
{% endblock %}
